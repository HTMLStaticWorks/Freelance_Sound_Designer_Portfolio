<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA SOUND | Login</title>
  <meta name="description" content="Login to Aura Sound Dashboard.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Additions for better remember-me alignment */
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
  </style>
</head>

<body class="auth-page">

  <!-- Floating Toggles Top Right -->
  <div class="auth-header-actions">
    <button class="icon-btn rtl-toggle" title="Toggle RTL">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-sm">
        <path d="M20 8H4M8 4l-4 4 4 4"></path>
        <path d="M4 16h16M16 12l4 4-4 4"></path>
      </svg>
    </button>
    <button class="icon-btn theme-toggle" title="Toggle Dark/Light">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-sm">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </div>

  <div class="auth-card fade-in-up">
    <!-- Logo Inside Card -->
    <a href="index.html" class="logo auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
        stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-lg">
        <path d="M2 12h4l3-9 5 18 3-9h5"></path>
      </svg>
      AURA<span>SOUND</span>
    </a>

    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Log in to your client dashboard.</p>

    <!-- Social Logins -->
    <div class="social-btns">
      <button class="btn btn-social">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-sm">
          <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
        </svg>
        Continue with Google
      </button>
      <button class="btn btn-social">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-sm">
          <path
            d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z">
          </path>
          <path d="M10 2c1 .5 2 2 2 5h-2c0-3-1-4-2-5Z"></path>
        </svg>
        Continue with Apple
      </button>
    </div>

    <div class="auth-divider">or log in with email</div>

    <!-- Login Form -->
    <form action="dashboard.html" method="GET">

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" class="input" placeholder="hello@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="input" placeholder="••••••••" required>
          <button type="button" class="pwd-toggle input-icon" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="icon icon-sm">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-row">
        <label class="checkbox-wrapper">
          <input type="checkbox" id="remember">
          <span style="font-weight: 400;">Remember me</span>
        </label>
        <a href="#" style="color: var(--primary); font-weight: 500;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>

    </form>

    <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem;">
      Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign Up</a>
    </p>

  </div>

  <script src="js/script.js"></script>
</body>

</html>
